name: Release — Go (Windows + Linux)

# Bir sürüm etiketi push edildiğinde Windows EXE + Linux binary üretir ve
# mevcut GitHub Release'e ekler.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release etiketi (ör. v1.1)"
        required: true

permissions:
  contents: write

jobs:
  # ── Windows EXE (CGO kapalı — herhangi bir runner'dan cross-compile edilir) ──
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false   # go.sum repo'da yok; tidy her seferinde çeker

      - name: Bağımlılıkları çek + go.sum üret
        working-directory: go
        run: go mod tidy

      - name: Windows EXE derle
        working-directory: go
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -H windowsgui" \
            -o WallPaps.exe .

      - name: Release'e yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: go/WallPaps.exe
          body: |
            ## WallPaps ${{ github.event.inputs.tag || github.ref_name }} — Windows

            **Kurulum:** `WallPaps.exe`'yi indir ve çalıştır. Kurulum gerekmez.
            Gereksinim: Windows 10/11 (64-bit).

  # ── Linux binary (CGO açık — GTK3 sistray backend) ──────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GTK3 + AppIndicator kütüphanelerini kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Bağımlılıkları çek + go.sum üret
        working-directory: go
        run: go mod tidy

      - name: Linux binary derle
        working-directory: go
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          go build \
            -ldflags="-s -w" \
            -o WallPaps-linux-amd64 .

      - name: Release'e yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: go/WallPaps-linux-amd64
          body: |
            ## WallPaps ${{ github.event.inputs.tag || github.ref_name }} — Linux

            **Gereksinim:** GNOME / KDE Plasma / XFCE / i3+feh (GTK3 çalışma zamanı dahil çoğu masaüstü dağıtım).
            ```bash
            chmod +x WallPaps-linux-amd64
            ./WallPaps-linux-amd64
            ```
