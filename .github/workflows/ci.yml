name: CI

# main'e her push'ta ve PR'da derlemenin bozulmadığını doğrular.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read   # checkout için yeterli; write asla gerekmez

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Derle (release)
        run: swift build -c release
      - name: Self-test (pipeline + katalog + render)
        continue-on-error: true   # ağ/müze API'sine bağlı; derleme asıl kapı
        run: .build/release/WallPaps --selftest
