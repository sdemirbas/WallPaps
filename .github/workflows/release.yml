name: Release

# Bir sürüm etiketi (v1.0, v1.1 …) push edildiğinde: imzalar, NOTARIZE eder,
# staple'lar, DMG'yi Release olarak yayınlar ve appcast.xml'i günceller.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release etiketi (ör. v1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          # appcast.xml commit için tam git geçmişi gerekli
          fetch-depth: 0

      - name: Xcode'u seç (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Developer ID sertifikasını içe aktar
        env:
          CERT_B64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/cert.p12"
          KC="$RUNNER_TEMP/app.keychain-db"
          echo "$CERT_B64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KC"

      - name: Derle · imzala · notarize · staple
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FEED_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main/appcast.xml"
        run: |
          set -euo pipefail
          ./Scripts/build-app.sh

          # 1) Quarantine + imzalamadan ÖNCE tüm extended attribute'ları temizle.
          #    Sonraya bırakılırsa Sparkle imzaları silinir — notarize "Invalid" verir.
          xattr -cr WallPaps.app

          # 2) Sparkle.framework: inside-out imzalama (yapraktan köke).
          #    --preserve-metadata=entitlements: XPC servislerinin orijinal network.client
          #    vb. entitlement'larını korur; bunlar notarize için zorunlu.
          if [[ -d "WallPaps.app/Contents/Frameworks/Sparkle.framework" ]]; then
            FW="WallPaps.app/Contents/Frameworks/Sparkle.framework"

            # 2a) Tüm yürütülebilir dosyalar ve dylib'ler (yaprak düğümler önce)
            find "$FW" -type f \( -perm +0111 -o -name "*.dylib" \) | while read -r f; do
              codesign --force --options runtime --timestamp \
                --sign "$SIGN_IDENTITY" --preserve-metadata=entitlements "$f" 2>/dev/null || true
            done

            # 2b) XPC servisleri (bundle olarak imzalanır — içerikleri 2a'da imzalandı)
            find "$FW" -name "*.xpc" -type d | while read -r d; do
              codesign --force --options runtime --timestamp \
                --sign "$SIGN_IDENTITY" --preserve-metadata=entitlements "$d"
            done

            # 2c) Updater.app varsa (Sparkle 2.x — iç güncelleme UI'ı)
            if [[ -d "$FW/Versions/B/Updater.app" ]]; then
              codesign --force --options runtime --timestamp \
                --sign "$SIGN_IDENTITY" "$FW/Versions/B/Updater.app"
            fi

            # 2d) Framework'ün kendisi (--options runtime zorunlu)
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$FW"
          fi

          # 3) Ana uygulamayı imzala
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" WallPaps.app
          codesign --verify --strict --verbose=2 WallPaps.app

          # Uygulamayı notarize + staple (log başarısızlıkta otomatik alınır)
          ditto -c -k --keepParent WallPaps.app app.zip
          NOTARY_OUT="$(xcrun notarytool submit app.zip --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" --password "$NOTARY_PASSWORD" \
            --wait --output-format json 2>&1)"
          echo "$NOTARY_OUT"
          NOTARY_STATUS="$(echo "$NOTARY_OUT" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || true)"
          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            NOTARY_ID="$(echo "$NOTARY_OUT" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)"
            echo "=== Notarize BAŞARISIZ (${NOTARY_STATUS}) — detaylı log ==="
            [[ -n "$NOTARY_ID" ]] && xcrun notarytool log "$NOTARY_ID" \
              --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" \
              --password "$NOTARY_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple WallPaps.app

          # DMG paketle, notarize + staple
          STAGING="$(mktemp -d)"
          cp -R WallPaps.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname WallPaps -srcfolder "$STAGING" -ov -format UDZO WallPaps.dmg
          xcrun notarytool submit WallPaps.dmg --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" --password "$NOTARY_PASSWORD" --wait
          xcrun stapler staple WallPaps.dmg
          xcrun stapler validate WallPaps.dmg

      - name: appcast.xml güncelle
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"

          # Sparkle'ın generate_appcast aracını bul
          GENERATE=$(find .build/artifacts -name "generate_appcast" 2>/dev/null | head -1 || true)
          if [[ -z "$GENERATE" ]]; then
            echo "  (uyarı: generate_appcast bulunamadı; appcast atlandı)"
            exit 0
          fi

          # Özel anahtarı geçici dosyaya yaz
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"

          DOWNLOAD_PREFIX="https://github.com/${{ github.repository }}/releases/download/${TAG}/"
          # generate_appcast --output desteklemez; çıktıyı tarama dizinine yazar.
          "$GENERATE" \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            .

          # appcast.xml'i main branch'e commit et
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || \
            git commit -m "chore: appcast ${TAG} [skip ci]"
          git push origin HEAD:main

      - name: Release oluştur / güncelle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: WallPaps ${{ github.event.inputs.tag || github.ref_name }}
          files: WallPaps.dmg
          body: |
            ## WallPaps ${{ github.event.inputs.tag || github.ref_name }}

            Kamu malı (CC0) tabloları aydınlatılmış galeri duvarı hissiyle 4K duvar
            kâğıdına dönüştüren, düşük enerjili ücretsiz macOS menü-çubuğu uygulaması.

            **Kurulum:** `WallPaps.dmg`'yi indir → aç → Applications'a sürükle → **çift tıkla**.
            (Apple tarafından notarize edilmiştir; Gatekeeper uyarısı çıkmaz.)

            Gereksinim: macOS 14+ (Apple Silicon).
